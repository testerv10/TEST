name: Android Emulator GUI

on:
workflow_dispatch:

jobs:
android:
runs-on: ubuntu-latest
timeout-minutes: 360

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Install Dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        qemu-kvm \
        xvfb \
        x11vnc \
        novnc \
        websockify \
        wget \
        curl

      sudo chmod 666 /dev/kvm || true

  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: 17

  - name: Start Virtual Display
    run: |
      export DISPLAY=:99
      Xvfb :99 -screen 0 1280x720x24 &
      echo "DISPLAY=:99" >> $GITHUB_ENV

  - name: Start VNC Server
    run: |
      x11vnc -display :99 -nopw -forever -shared -rfbport 5900 &
      sleep 5

  - name: Start noVNC
    run: |
      websockify --web=/usr/share/novnc/ 6080 localhost:5900 &
      sleep 5

  - name: Install Cloudflared
    run: |
      wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
      chmod +x cloudflared-linux-amd64
      sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

  - name: Expose noVNC Public URL
    run: |
      cloudflared tunnel --url http://localhost:6080 > tunnel.log 2>&1 &
      sleep 20

      echo "=================================="
      echo "PUBLIC GUI URL"
      echo "=================================="

      grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' tunnel.log | head -n 1

      echo "=================================="

  - name: Create AVD and Start Emulator
    uses: ReactiveCircus/android-emulator-runner@v2
    with:
      api-level: 34
      arch: x86_64
      profile: pixel_7
      emulator-options: >
        -gpu swiftshader_indirect
        -noaudio
        -no-snapshot
        -camera-back none
        -camera-front none
      script: |
        adb wait-for-device

        echo "=================================="
        echo "ANDROID EMULATOR READY"
        echo "=================================="

        adb shell getprop ro.build.version.release
        adb devices

        while true; do
          echo "Runner Alive: $(date)"
          sleep 60
        done
```
